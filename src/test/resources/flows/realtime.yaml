id: realtime
namespace: io.kestra.tests

triggers:
  - id: watch
    type: io.kestra.plugin.mqtt.RealtimeTrigger
    topic: test/realtime/trigger
    server: tcp://127.0.0.1:1883
    serdeType: JSON
    mqttVersion: V5

tasks:
  - id: end
    type: io.kestra.plugin.core.debug.Return
    format: "{{task.id}} > {{taskrun.startDate}}"
